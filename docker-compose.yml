services:
  postgres:
    image: postgres:17.2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Chiggi@30
      POSTGRES_DB: crypto_auth
    ports:
      - 55432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7.4.2
    container_name: redis
    restart: unless-stopped
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: